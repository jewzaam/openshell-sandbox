# OpenShell sandbox policy: research profile
# Vertex AI + Claude platform — no Jira, no Atlassian
#
# NOTE: Open web egress blocked by OpenShell L7 policy (no wildcard host support).
# WebSearch works (Anthropic API-side). WebFetch blocked for non-allowlisted domains.
# Full research profile requires native provider support (issue #3) to remove creds
# from sandbox, making open egress safe.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /proc
    - /sys
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /home

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai-inference
    endpoints:
      - host: "**.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  claude_platform:
    name: claude-platform
    endpoints:
      - host: claude.ai
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: platform.claude.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: statsig.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  otel:
    name: otel-collector
    endpoints:
      - host: host.containers.internal
        port: 4318
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  pypi:
    name: pypi-readonly
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: "/**" }
