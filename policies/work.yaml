# OpenShell sandbox policy: work profile
# Vertex AI (Google Cloud) + Jira + GitHub

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /proc
    - /sys
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /home

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai-inference
    endpoints:
      - host: "**.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  jira_api:
    name: jira-rw
    endpoints:
      - host: redhat.atlassian.net
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: api.atlassian.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: auth.atlassian.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  npm:
    name: npm-readonly
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: "/**" }

  otel:
    name: otel-collector
    endpoints:
      - host: host.containers.internal
        port: 4318
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

  pypi:
    name: pypi-readonly
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: "/**" }
